name: Validate Repository

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock
      - run: python -m pip install --require-hashes -r requirements.lock
      - name: Check evaluation case registry
        run: python scripts/check_evaluation_case_registry.py
      - name: Verify evaluation registry is generated
        shell: bash
        run: |
          python scripts/update_evaluation_case_registry.py
          git diff --exit-code -- tests/prompt_regression/evaluation_case_registry.json
      - run: python -m ruff check scripts tests formal_result
      - run: python -m pyright
      - run: python scripts/validate_repository.py
      - name: Check generated current status
        run: python scripts/check_state_consistency.py
      - name: Run unit-contract tests
        run: python -m coverage run -m pytest tests -q -m "not integration_fixture and not official_integration"
      - name: Run public fixture integration tests
        run: python -m coverage run --append -m pytest tests -q -m integration_fixture
      - run: python -m coverage report --fail-under=75
      - name: Verify deterministic runtime build
        shell: bash
        env:
          SOURCE_DATE_EPOCH: "1783699200"
        run: |
          python scripts/export_runtime_pack.py --context new_problem --profile general --output first.md --manifest-output first.json
          python scripts/export_runtime_pack.py --context new_problem --profile general --output second.md --manifest-output second.json
          python -c "import json; a=json.load(open('first.json',encoding='utf-8')); b=json.load(open('second.json',encoding='utf-8')); assert a==b; assert open('first.md','rb').read()==open('second.md','rb').read()"

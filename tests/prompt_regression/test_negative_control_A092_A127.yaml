# 负控回归用例：A092 / A127 在不适用题上的隔离测试
#
# 用途：选择一道纯评价/排序/预测类旧题（无空间布局、无定日镜/遮挡/阵列/覆盖带/路径布设），
# 分别运行 baseline、A092-only、A127-only，把 AI 的 diagnosis.json 喂给本用例评估。
#
# 通过标准（见 reviews 计划 §七 A092 / §八 A127）：
#   - patch_decisions.<patch>.applicable 必须为 false 且给出理由；
#   - subproblems / decision_variables / selected_route 不得出现 patch 特有机制词；
#   - primary_type 不得被错误改成工程优化；
#   - 必须保留 manual_confirmation。
#
# 注意：expected.primary_type 的具体取值取决于所选负控题，请在使用前按实际题目填写
# （例如纯评价题填 "evaluation"，纯预测题填 "prediction"）。下方先以"不得为优化"作为软约束。

cases:
  - case_id: nc_a092_a127_negative_control
    description: A092/A127 在不适用题上的负控：patch 应判定不适用，不得迁移原论文机制
    input:
      stage: diagnosis
      instruction: |
        执行 Gate 0-2 总控诊断。本题不属于工程优化，不存在空间布局、定日镜、遮挡、阵列、
        覆盖带或路径布设。若运行包中含 A092/A127 patch，请显式判定其不适用并给出理由，
        不得为使用 patch 而强行迁移原论文场景机制。同时输出 diagnosis.md 与 diagnosis.json。
    expected:
      # 硬约束：负控题上两个 patch 都必须显式判定不适用
      patch_not_applicable:
        A092: false
        A127: false
      # 必须保留人工确认
      requires_manual_confirmation: true
      must_have_paths:
        - primary_type
        - subproblems
        - selected_route
        - patch_decisions.A092.reason
        - patch_decisions.A127.reason
        - manual_confirmation
      # 字段级禁止值：只检查指定字段，不误判解释/拒绝理由
      forbidden_values:
        # primary_type 不得被错误改成工程优化
        primary_type:
          - 工程优化
          - optimization
          - 布局优化
        # 子问题不得出现 A092 原论文机制
        subproblems:
          - 定日镜
          - 光学效率
          - 镜场
          - 同心圆布局
        # 子问题不得出现 A127 原论文机制
        decision_variables:
          - 空间布局
          - 阵列
          - 遮挡
          - 覆盖带
          - 测线布设
          - 粗搜索
          - 细搜索
        # 选定路线不得强行套用工程优化范式
        selected_route:
          - 评价函数
          - 先评价后优化

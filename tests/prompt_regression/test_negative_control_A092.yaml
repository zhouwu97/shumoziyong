# A092 在 2016-C 纯预测题上的负控测试
#
# 该题只要求放电曲线建模与剩余放电时间预测，
# 不应引入工程方案设计、布局或约束寻优。

cases:
  - case_id: nc_a092_2016C
    description: A092 在 2016-C 预测题上的负控，不得把预测任务改造成工程设计优化
    input:
      stage: diagnosis
      instruction: |
        执行 Gate 0-2 总控诊断。仅依据题面和附件内容，
        独立判断当前运行包内每个 Patch 是否适用于本题。
        不要因为某个 Patch 已被加载就强行使用它。
        Patch 适用时说明使用范围；不适用时说明具体原因。

    expected:
      patch_not_applicable:
        A092: false

      requires_manual_confirmation: true

      must_have_paths:
        - primary_type
        - subproblems
        - candidate_models
        - selected_route
        - decision_variables
        - patch_decisions.A092.reason
        - manual_confirmation

      forbidden_values:
        subproblems:
          - 空间布局
          - 布局设计
          - 工程方案寻优
          - 工程设计优化
          - 约束方案优化
          - 设计变量优化

        decision_variables:
          - 空间坐标
          - 对象间距
          - 安全距离
          - 布局变量
          - 工程设计变量
          - 方案选择变量

        selected_route:
          - 同心圆布局
          - 定日镜
          - 工程方案寻优
          - 布局搜索
          - 粗搜索
          - 细搜索
          - 遗传算法
          - 粒子群
          - 模拟退火

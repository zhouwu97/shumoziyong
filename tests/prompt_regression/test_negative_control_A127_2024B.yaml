# 负控回归用例：A127 在 2024-B (不适用题) 上的隔离测试
#
# 用途：2024-B 题（生产决策）无空间布局、无遮挡/覆盖带/阵列规划。
#
# 通过标准：
#   - patch_decisions.A127.applicable 必须为 false 且给出理由；
#   - subproblems / decision_variables / selected_route 不得出现 patch 特有机制词；
#   - primary_type 不得被错误改变；
#   - 必须保留 manual_confirmation。

cases:
  - case_id: nc_a127_2024B
    description: A127 在 2024-B 上的负控：patch 应判定不适用，不得迁移原论文机制
    input:
      stage: diagnosis
      instruction: |
        执行 Gate 0-2 总控诊断。仅依据题面和附件内容，独立判断当前运行包内每个 Patch 是否适用于本题。不要因为某个 Patch 已被加载就强行使用它。Patch 适用时说明使用范围；不适用时说明具体原因。
    expected:
      patch_not_applicable:
        A127: false
      requires_manual_confirmation: true
      must_have_paths:
        - primary_type
        - subproblems
        - selected_route
        - patch_decisions.A127.reason
        - manual_confirmation
      forbidden_values:
        subproblems:
          - 空间布局
          - 阵列
          - 遮挡
          - 覆盖带
          - 测线布设
          - 粗搜索
          - 细搜索
        decision_variables:
          - 空间布局
          - 阵列
          - 遮挡
          - 覆盖带
          - 测线布设
          - 粗搜索
          - 细搜索
